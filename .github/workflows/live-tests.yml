# Go SDK — Live Tests

name: Live Tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:            # run on PRs to any base (feature-branch stacks included)
  workflow_dispatch:

env:
  # Secrets (set in repo → Settings → Secrets and variables → Actions → Secrets)
  MESHAPI_BASE_URL: ${{ secrets.MESHAPI_BASE_URL }}
  MESHAPI_TOKEN: ${{ secrets.MESHAPI_TOKEN }}
  # Core models — safe non-secret defaults.
  MESHAPI_MODEL: "openai/gpt-4o-mini"
  MESHAPI_EMBEDDINGS_MODEL: "openai/text-embedding-3-small"
  MESHAPI_SECOND_MODEL: "anthropic/claude-haiku-4.5"
  MESHAPI_REALTIME_MODEL: "openai/gpt-realtime-mini"
  MESHAPI_IMAGE_URL: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg"
  # Feature models — inlined (non-secret). Video generation is intentionally
  # left unset (skips: too costly to run in CI). Strict mode is off.
  MESHAPI_IMAGE_GEN_MODEL: "openai/gpt-image-1"
  MESHAPI_IMAGE_EDIT_MODEL: "openai/gpt-image-1"

jobs:
  live-test:
    name: Go SDK Live Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SDK source (including tests)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go 1.22
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: "1.22"

      - name: Run live tests
        working-directory: livetests
        # 300s (matches documented local usage): the full live suite now
        # includes the added endpoint tests and exceeds the old 120s cap.
        run: go test -v -timeout 300s ./...

      - name: Write job summary
        if: always()
        run: |
          echo "## 🐹 Go SDK Live Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go | 1.22 |" >> $GITHUB_STEP_SUMMARY
          echo "| Base URL | \`${{ env.MESHAPI_BASE_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ env.MESHAPI_MODEL }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: failure()
        uses: slackapi/slack-github-action@0d95c9a7becc1e6e297d76df9bc735c44f4cbcbc  # v3.0.5
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Go SDK Live Tests* — ${{ job.status }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run> · ${{ github.head_ref || github.ref_name }}"
            }
